<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beta Button</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      font-family: Arial, sans-serif;
    }

    #message {
      font-size: 24px;
      cursor: pointer;
      padding: 15px 25px;
      border: 2px solid black;
      border-radius: 8px;
      transition: 0.2s;
    }

    #message:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

<div id="message" onclick="becomeBeta()">Click Me!</div>

<script>
  function becomeBeta() {
    document.getElementById("message").innerText = "You are now a beta!";
  }
</script>

</body>
</html>
